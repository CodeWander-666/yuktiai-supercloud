app = "supercloud-orch"  # Use your actual Fly.io app name
primary_region = "bom"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  # We'll set secrets via GitHub Actions, not here

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
  [[services.ports]]
    handlers = ["http"]
    port = 80
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
