name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tidy dependencies
        run: go mod tidy

      - name: Build for Windows
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -o dist/supercloud-node-windows-amd64.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: supercloud-node-windows-amd64
          path: dist/supercloud-node-windows-amd64.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tidy dependencies
        run: go mod tidy

      - name: Build for Android
        run: |
          mkdir -p dist
          GOOS=android GOARCH=arm64 go build -o dist/supercloud-node-android-arm64 .

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: supercloud-node-android-arm64
          path: dist/supercloud-node-android-arm64
